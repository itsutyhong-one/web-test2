<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KDN Charge 운영시스템 — 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
  <style>
    /* ─── 대시보드 flex 레이아웃 ────────────────────── */
    #dashboardContent {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }
    .dash-section { flex: 0 0 100%; min-width: 0; }
    .dash-section.half-width { flex: 0 0 calc(50% - 8px); }
    .dash-section > .card { margin-bottom: 0; }
    .dash-section > .stat-grid { margin-bottom: 0; }

    /* ─── 드래그 핸들 ────────────────────────────────── */
    .dash-handle {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: linear-gradient(to right, #eff6ff, #dbeafe);
      border: 1.5px dashed #93c5fd;
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      cursor: grab;
      user-select: none;
      font-size: 0.8rem;
      font-weight: 700;
      color: #2563eb;
    }
    .dash-handle:active { cursor: grabbing; }
    .dash-grip { color: #93c5fd; letter-spacing: 2px; }
    .dash-hint { margin-left: auto; font-size: 0.72rem; color: #93c5fd; font-weight: 400; }

    .dash-remove {
      width: 22px; height: 22px; border-radius: 50%; border: none;
      background: rgba(239,68,68,0.1); color: #ef4444;
      font-size: 0.78rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, color 0.15s;
    }
    .dash-remove:hover { background: #ef4444; color: #fff; }

    .dash-resize {
      height: 22px; padding: 0 8px; border-radius: 5px;
      border: 1.5px solid #93c5fd; background: rgba(37,99,235,0.07);
      color: #2563eb; font-size: 0.72rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      flex-shrink: 0; transition: background 0.15s; font-family: inherit;
    }
    .dash-resize:hover { background: rgba(37,99,235,0.18); }
    .dash-resize .ri { display: flex; gap: 2px; align-items: center; }
    .dash-resize .ri span { display: inline-block; height: 10px; background: currentColor; border-radius: 1px; opacity: 0.7; }
    .dash-resize .ri .r1 { width: 14px; }
    .dash-resize .ri .r2, .dash-resize .ri .r3 { width: 6px; }

    /* ─── 편집 모드 상태 ─────────────────────────────── */
    .dash-section.edit-mode { outline: 1.5px dashed #bfdbfe; outline-offset: 2px; }
    .dash-section.edit-mode .dash-handle { display: flex; }
    .dash-section.edit-mode .dash-handle ~ * { pointer-events: none; }
    .dash-section.is-dragging { opacity: 0.3; }

    .drop-ph {
      flex: 0 0 100%;
      background: rgba(37,99,235,0.05);
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      pointer-events: none;
    }

    /* ─── 편집 버튼 ──────────────────────────────────── */
    #editDashBtn {
      font-size: 0.8rem; padding: 5px 14px; border-radius: 8px;
      border: 1.5px solid #d1d5db; background: #fff; color: #555;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all 0.18s; font-family: inherit;
    }
    #editDashBtn:hover { border-color: #2563eb; color: #2563eb; }
    #editDashBtn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* ─── 위젯 카탈로그 ──────────────────────────────── */
    .wcat {
      display: none;
      border: 2px dashed #e0e7ff;
      border-radius: 14px;
      padding: 20px;
      background: #f8faff;
      margin-bottom: 16px;
    }
    .wcat.show { display: block; }
    .wcat-title { font-size: 0.82rem; font-weight: 700; color: #2563eb; margin-bottom: 14px; }
    .wcat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .wcat-card {
      background: #fff; border: 1.5px solid #e0e7ff; border-radius: 10px;
      padding: 13px 15px; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .wcat-card:hover { border-color: #2563eb; box-shadow: 0 2px 12px rgba(37,99,235,0.1); }
    .wcat-icon { font-size: 1.3rem; margin-bottom: 5px; }
    .wcat-label { font-size: 0.84rem; font-weight: 700; color: #1a202c; margin-bottom: 2px; }
    .wcat-desc { font-size: 0.73rem; color: #aaa; }
    .wcat-empty { color: #aaa; font-size: 0.82rem; }

    /* ─── 배지 ───────────────────────────────────────── */
    .sql-notice {
      margin: 0 20px 16px;
      padding: 9px 14px;
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 8px; font-size: 0.76rem; color: #92400e;
    }
    .demo-badge {
      font-size: 0.72rem; color: #d97706;
      padding: 3px 8px; background: #fffbeb;
      border: 1px solid #fde68a; border-radius: 6px;
    }

    /* ─── 반응형 ─────────────────────────────────────── */
    @media (max-width: 960px) {
      .dash-section.half-width { flex: 0 0 100%; }
    }
    @media (max-width: 480px) {
      .wcat-grid { grid-template-columns: 1fr 1fr; }
      #editDashBtn { padding: 5px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body data-page="dashboard">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">대시보드</span>
      <div class="topbar-right">
        <span class="topbar-date" id="topbarDate"></span>
        <button id="editDashBtn" onclick="toggleEdit()">✏ 편집</button>
        <div class="topbar-user"><div class="user-avatar">관</div><span>관리자</span></div>
      </div>
    </div>

    <div class="page-content">
      <div class="wcat" id="widgetCatalog">
        <div class="wcat-title">➕ 추가할 수 있는 위젯</div>
        <div class="wcat-grid" id="widgetCatalogGrid"></div>
      </div>
      <div id="dashboardContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="env.js"></script>
  <script src="supabase-client.js"></script>
  <script src="admin.js"></script>
  <script>
  // ── 위젯 정의 레지스트리 ───────────────────────────
  const WIDGET_DEFS = [
    { id: 'stat',        icon: '📊', label: '통계 카드',       desc: '주요 KPI 4가지 요약',            defaultOn: true  },
    { id: 'charger',     icon: '⚡', label: '충전기 상태',      desc: '상태별 도넛 차트 + 목록',        defaultOn: true  },
    { id: 'faults',      icon: '🔧', label: '최근 고장 접수',   desc: '미처리 고장 접수 목록',          defaultOn: true  },
    { id: 'weekly',      icon: '💰', label: '주간 매출',        desc: '최근 7일 일별 매출 바 차트',     defaultOn: true  },
    { id: 'history',     icon: '📋', label: '최근 충전 내역',   desc: '최신 충전 기록 10건',            defaultOn: true  },
    { id: 'stationRank', icon: '🏆', label: '충전소 매출 순위', desc: '충전소별 누적 매출 TOP 5',       defaultOn: false },
    { id: 'visitors',    icon: '👥', label: '방문자 현황',      desc: '일별 홈페이지 방문자 수',        defaultOn: false },
    { id: 'members',     icon: '📝', label: '회원 가입 현황',   desc: '일별 신규 회원 가입 수',         defaultOn: false },
  ];

  // ── 상태 ────────────────────────────────────────────
  let editActive = false, dragSrc = null, dropPh = null;

  function getOrder() {
    const saved = JSON.parse(localStorage.getItem('kdn_dash_order') || 'null');
    return saved || WIDGET_DEFS.filter(w => w.defaultOn).map(w => w.id);
  }
  function saveOrder() {
    const ids = [...document.querySelectorAll('#dashboardContent > .dash-section')].map(s => s.dataset.id);
    localStorage.setItem('kdn_dash_order', JSON.stringify(ids));
  }

  // ── 너비 저장/불러오기 ──────────────────────────────
  function getWidths() {
    return JSON.parse(localStorage.getItem('kdn_dash_widths') || '{}');
  }
  function saveWidths() {
    const w = {};
    document.querySelectorAll('#dashboardContent > .dash-section.half-width').forEach(s => {
      w[s.dataset.id] = 'half';
    });
    localStorage.setItem('kdn_dash_widths', JSON.stringify(w));
  }
  function resizeBtnHTML(isHalf) {
    if (isHalf) {
      return `<span class="ri"><span class="r1"></span></span>1단`;
    }
    return `<span class="ri"><span class="r2"></span><span class="r3"></span></span>2단`;
  }
  function toggleWidth(id) {
    const sec = document.querySelector(`.dash-section[data-id="${id}"]`);
    if (!sec) return;
    const isHalf = sec.classList.toggle('half-width');
    const btn = sec.querySelector('.dash-resize');
    if (btn) btn.innerHTML = resizeBtnHTML(isHalf);
    saveWidths();
  }

  // ── 위젯 DOM 빌더 ────────────────────────────────────
  function buildSection(def) {
    const sec = document.createElement('div');
    sec.className = 'dash-section';
    sec.dataset.id = def.id;
    const isHalf = getWidths()[def.id] === 'half';
    if (isHalf) sec.classList.add('half-width');
    sec.innerHTML = `
      <div class="dash-handle">
        <span class="dash-grip">⠿⠿</span>
        <span>${def.icon} ${def.label}</span>
        <span class="dash-hint">드래그하여 이동</span>
        <button class="dash-resize" onclick="toggleWidth('${def.id}')">${resizeBtnHTML(isHalf)}</button>
        <button class="dash-remove" onclick="removeWidget('${def.id}')">✕</button>
      </div>
      <div id="wc-${def.id}"></div>`;
    return sec;
  }

  function getWidgetHTML(id) {
    switch (id) {
      case 'stat':
        return `<div class="stat-grid" id="statGrid"></div>`;

      case 'charger':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">충전기 상태 요약</span>
            <a href="realtime.html" class="btn btn-sm btn-secondary">전체보기</a>
          </div>
          <div class="card-body" style="display:flex;gap:24px;align-items:center;">
            <div style="flex-shrink:0;"><canvas id="statusDonut"></canvas></div>
            <div id="statusSummary" style="flex:1;"></div>
          </div>
        </div>`;

      case 'faults':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">최근 고장 접수</span>
            <a href="fault.html" class="btn btn-sm btn-secondary">전체보기</a>
          </div>
          <div class="card-body" id="recentFaults" style="padding:0;"></div>
        </div>`;

      case 'weekly':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">주간 매출 현황</span>
            <span id="weeklyChangeBadge" style="font-size:0.82rem;font-weight:700;padding:4px 14px;border-radius:100px;"></span>
            <a href="history.html" class="btn btn-sm btn-secondary" style="margin-left:8px;">전체보기</a>
          </div>
          <div class="card-body" style="display:flex;gap:32px;align-items:flex-start;">
            <div id="weeklyStats" style="flex-shrink:0;min-width:155px;"></div>
            <div style="flex:1;min-width:0;"><canvas id="weeklyChart" height="160" style="display:block;width:100%;"></canvas></div>
          </div>
        </div>`;

      case 'history':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">최근 충전 내역 (최신 10건)</span>
            <a href="history.html" class="btn btn-sm btn-secondary">전체보기</a>
          </div>
          <div class="table-wrap">
            <table><thead><tr>
              <th>충전소</th><th>충전기 ID</th><th>차량번호</th>
              <th>시작 시각</th><th>충전량(kWh)</th><th>결제 금액</th><th>회원유형</th>
            </tr></thead><tbody id="recentHistoryBody"></tbody></table>
          </div>
        </div>`;

      case 'stationRank':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">충전소 매출 순위 (TOP 5)</span>
            <a href="history.html" class="btn btn-sm btn-secondary">전체보기</a>
          </div>
          <div class="card-body" id="stationRankContent"></div>
        </div>`;

      case 'visitors':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">방문자 현황</span>
            <span class="demo-badge">데모 데이터</span>
          </div>
          <div class="card-body" style="display:flex;gap:32px;align-items:flex-start;">
            <div id="visitorStats" style="flex-shrink:0;min-width:130px;"></div>
            <div style="flex:1;min-width:0;"><canvas id="visitorChart" height="140" style="display:block;width:100%;"></canvas></div>
          </div>
          <div class="sql-notice">📋 실제 데이터를 보려면 Supabase에 <strong>page_views</strong> 테이블이 필요합니다. 아래 SQL 참고.</div>
        </div>`;

      case 'members':
        return `<div class="card">
          <div class="card-header">
            <span class="card-title">회원 가입 현황</span>
            <span class="demo-badge">데모 데이터</span>
          </div>
          <div class="card-body" style="display:flex;gap:32px;align-items:flex-start;">
            <div id="memberStats" style="flex-shrink:0;min-width:130px;"></div>
            <div style="flex:1;min-width:0;"><canvas id="memberChart" height="140" style="display:block;width:100%;"></canvas></div>
          </div>
          <div class="sql-notice">📋 실제 데이터를 보려면 Supabase에 <strong>members</strong> 테이블이 필요합니다. 아래 SQL 참고.</div>
        </div>`;

      default: return '';
    }
  }

  // ── 유틸 ────────────────────────────────────────────
  function seededRand(n) {
    const x = Math.sin(n * 9301 + 49297) * 233280;
    return x - Math.floor(x);
  }
  function getMockDays(count, min, max) {
    const today = new Date(); today.setHours(0,0,0,0);
    const DOW = ['일','월','화','수','목','금','토'];
    return Array.from({length: count}, (_, i) => {
      const d = new Date(today); d.setDate(today.getDate() - (count-1-i));
      const seed = Math.floor(d.getTime() / 86400000);
      return {
        label: `${d.getMonth()+1}/${d.getDate()}`,
        dow: DOW[d.getDay()],
        value: Math.round(seededRand(seed) * (max - min) + min),
        isToday: i === count - 1,
      };
    });
  }

  function drawBarChart({ canvasId, days, H = 140, colorFn, valFmt }) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.offsetWidth || 320;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    const max = Math.max(...days.map(d => d.value), 1);
    const chartB = H - 36, chartT = 18;
    const slotW = W / days.length;
    const barW = Math.min(slotW * 0.52, 42);

    // 가이드 선
    ctx.strokeStyle = '#f0f2f7'; ctx.lineWidth = 1;
    [0.5, 1].forEach(r => {
      const gy = chartB - r * (chartB - chartT);
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    });

    days.forEach((d, i) => {
      const cx = slotW * i + slotW / 2, bx = cx - barW / 2;
      const barH = d.value > 0 ? Math.max(3, (d.value / max) * (chartB - chartT)) : 0;
      const by = chartB - barH;
      const col = colorFn ? colorFn(d, i) : (d.isToday ? '#2563eb' : '#c7d2fe');
      const grad = ctx.createLinearGradient(bx, by, bx, chartB);
      grad.addColorStop(0, col);
      grad.addColorStop(1, col + '88');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(bx + 3, by);
      ctx.arcTo(bx + barW, by, bx + barW, chartB, 3);
      ctx.lineTo(bx + barW, chartB); ctx.lineTo(bx, chartB);
      ctx.lineTo(bx, by + 3); ctx.arcTo(bx, by, bx + barW, by, 3);
      ctx.fill();

      if (d.value > 0) {
        ctx.fillStyle = d.isToday ? col : '#94a3b8';
        ctx.font = `${d.isToday ? 'bold ' : ''}9px 'Noto Sans KR',sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(valFmt ? valFmt(d.value) : d.value, cx, by - 2);
      }

      ctx.textBaseline = 'top'; ctx.textAlign = 'center';
      ctx.fillStyle = d.isToday ? col : '#94a3b8';
      ctx.font = `${d.isToday ? 'bold ' : ''}9px 'Noto Sans KR',sans-serif`;
      ctx.fillText(d.label, cx, chartB + 5);
      ctx.fillStyle = d.isToday ? col : '#cbd5e1';
      ctx.font = `8px 'Noto Sans KR',sans-serif`;
      ctx.fillText(d.dow || '', cx, chartB + 17);
    });

    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, chartB); ctx.lineTo(W, chartB); ctx.stroke();
  }

  // ── 위젯 렌더 함수들 ─────────────────────────────────
  function renderStat() {
    const t = CHARGERS.length;
    const ch = CHARGERS.filter(c=>c.status==='charging').length;
    const fa = CHARGERS.filter(c=>c.status==='fault').length;
    const el = document.getElementById('statGrid');
    if (!el) return;
    el.innerHTML = `
      <div class="stat-card"><div class="stat-card-icon green">📍</div><div class="stat-card-info"><div class="stat-card-num">${STATIONS.length}</div><div class="stat-card-label">전체 충전소</div></div></div>
      <div class="stat-card"><div class="stat-card-icon blue">⚡</div><div class="stat-card-info"><div class="stat-card-num">${t}</div><div class="stat-card-label">전체 충전기</div></div></div>
      <div class="stat-card"><div class="stat-card-icon orange">🔌</div><div class="stat-card-info"><div class="stat-card-num">${ch}</div><div class="stat-card-label">현재 충전 중</div></div></div>
      <div class="stat-card"><div class="stat-card-icon red">🚨</div><div class="stat-card-info"><div class="stat-card-num">${fa}</div><div class="stat-card-label">고장 충전기</div></div></div>`;
  }

  function renderCharger() {
    const canvas = document.getElementById('statusDonut');
    if (!canvas) return;
    const total = CHARGERS.length;
    const statusData = [
      { label:'충전 가능', count:CHARGERS.filter(c=>c.status==='available').length,    color:'#00c896' },
      { label:'충전 중',   count:CHARGERS.filter(c=>c.status==='charging').length,     color:'#2563eb' },
      { label:'고장',      count:CHARGERS.filter(c=>c.status==='fault').length,        color:'#e74c3c' },
      { label:'오프라인',  count:CHARGERS.filter(c=>c.status==='offline').length,      color:'#999'    },
      { label:'점검 중',   count:CHARGERS.filter(c=>c.status==='maintenance').length,  color:'#d97706' },
    ];

    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const SIZE = 160;
    canvas.width = SIZE*dpr; canvas.height = SIZE*dpr;
    canvas.style.width = SIZE+'px'; canvas.style.height = SIZE+'px';
    ctx.scale(dpr, dpr);
    const cx = SIZE/2, cy = SIZE/2, outerR = 66, innerR = 40;

    const segs = [];
    let cum = 0;
    statusData.forEach(s => {
      if (!s.count) return;
      const slice = s.count / total * 2 * Math.PI;
      segs.push({...s, start:cum, end:cum+slice});
      cum += slice;
    });

    let hovered = null;
    const exp = new Array(segs.length).fill(0);
    let raf = null;

    function draw() {
      ctx.clearRect(0, 0, SIZE, SIZE);
      segs.forEach((s, i) => {
        const r = outerR + exp[i], gap = 0.018;
        const rs = s.start - Math.PI/2 + gap, re = s.end - Math.PI/2 - gap;
        if (re <= rs) return;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,rs,re); ctx.closePath();
        if (i === hovered) { ctx.shadowColor = s.color; ctx.shadowBlur = 10; }
        ctx.fillStyle = s.color; ctx.fill(); ctx.shadowBlur = 0;
      });
      ctx.beginPath(); ctx.arc(cx,cy,innerR,0,2*Math.PI);
      ctx.fillStyle='#fff'; ctx.fill();
      ctx.textAlign='center'; ctx.textBaseline='middle';
      if (hovered !== null && segs[hovered]) {
        ctx.fillStyle = segs[hovered].color;
        ctx.font = `bold 20px 'Noto Sans KR',sans-serif`;
        ctx.fillText(segs[hovered].count+'대', cx, cy-11);
        ctx.font = `11px 'Noto Sans KR',sans-serif`;
        ctx.fillStyle='#555'; ctx.fillText(segs[hovered].label, cx, cy+11);
      } else {
        ctx.fillStyle='#1a202c'; ctx.font=`bold 22px 'Noto Sans KR',sans-serif`;
        ctx.fillText(total, cx, cy-10);
        ctx.font=`12px 'Noto Sans KR',sans-serif`; ctx.fillStyle='#aaa';
        ctx.fillText('전체 충전기', cx, cy+12);
      }
    }
    function anim() {
      let dirty = false;
      segs.forEach((_,i) => {
        const t = i===hovered?9:0, diff = t-exp[i];
        if (Math.abs(diff)>0.15) { exp[i]+=diff*0.2; dirty=true; } else exp[i]=t;
      });
      draw();
      if (dirty) raf=requestAnimationFrame(anim); else raf=null;
    }
    function trig() { if(!raf) raf=requestAnimationFrame(anim); }

    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      const mx=e.clientX-r.left-cx, my=e.clientY-r.top-cy;
      const dist=Math.sqrt(mx*mx+my*my);
      if (dist<innerR||dist>outerR+14) { if(hovered!==null){hovered=null;trig();} canvas.style.cursor='default'; return; }
      let a=Math.atan2(my,mx)+Math.PI/2; if(a<0)a+=2*Math.PI;
      const idx=segs.findIndex(s=>a>=s.start&&a<s.end), next=idx>=0?idx:null;
      if(next!==hovered){hovered=next;trig();} canvas.style.cursor=next!==null?'pointer':'default';
    });
    canvas.addEventListener('mouseleave', ()=>{ hovered=null; trig(); });
    draw();

    const summaryEl = document.getElementById('statusSummary');
    if (summaryEl) summaryEl.innerHTML = statusData.map(s => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;">
        <div style="display:flex;align-items:center;gap:7px;min-width:72px;">
          <span style="width:10px;height:10px;border-radius:50%;background:${s.color};display:inline-block;flex-shrink:0;"></span>
          <span style="font-size:0.82rem;color:#555;">${s.label}</span>
        </div>
        <div style="flex:1;margin:0 10px;height:7px;background:#f0f2f7;border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${total?Math.round(s.count/total*100):0}%;background:${s.color};border-radius:4px;transition:width 0.4s;"></div>
        </div>
        <strong style="min-width:36px;text-align:right;font-size:0.88rem;color:#333;">${s.count}<span style="font-weight:400;color:#aaa;font-size:0.78rem;">대</span></strong>
      </div>`).join('');
  }

  function renderFaults() {
    const el = document.getElementById('recentFaults');
    if (!el) return;
    const active = FAULTS.filter(f => f.status !== '완료').slice(0, 5);
    el.innerHTML = (active.length ? active : FAULTS.slice(0,3)).map(f => `
      <div style="padding:14px 20px;border-bottom:1px solid #f0f2f7;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span class="badge ${f.severity==='high'?'badge-fault':f.severity==='medium'?'badge-maintenance':'badge-offline'}">${f.severity==='high'?'긴급':f.severity==='medium'?'보통':'경미'}</span>
          <strong style="font-size:0.88rem;">${f.stationName}</strong>
          <span class="fault-status-badge status-${f.status}" style="padding:2px 8px;border-radius:100px;font-size:0.72rem;font-weight:700;">${f.status}</span>
        </div>
        <div style="font-size:0.82rem;color:#555;">${f.chargerId} · ${f.type}</div>
        <div style="font-size:0.78rem;color:#bbb;margin-top:2px;">${f.reportedAt}</div>
      </div>`).join('') +
      `<div style="text-align:center;padding:12px;"><a href="fault.html" style="font-size:0.82rem;color:#00a87a;">전체 고장 내역 보기 →</a></div>`;
  }

  function renderWeekly() {
    const today = new Date(); today.setHours(0,0,0,0);
    const wStart = new Date(today); wStart.setDate(today.getDate()-6);
    const lStart = new Date(wStart); lStart.setDate(wStart.getDate()-7);

    let thisW = 0, lastW = 0;
    const dayMap = {};
    HISTORY.forEach(h => {
      const t = new Date(h.startTime);
      const k = `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
      if (t >= wStart) { thisW += h.amount; dayMap[k] = (dayMap[k]||0) + h.amount; }
      else if (t >= lStart) lastW += h.amount;
    });

    const DOW = ['일','월','화','수','목','금','토'];
    const days = Array.from({length:7}, (_,i) => {
      const d = new Date(today); d.setDate(today.getDate()-(6-i));
      const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      return { label:`${d.getMonth()+1}/${d.getDate()}`, dow:DOW[d.getDay()], value:dayMap[k]||0, isToday:i===6 };
    });

    const pct = lastW > 0 ? Math.round((thisW-lastW)/lastW*100) : null;
    const badge = document.getElementById('weeklyChangeBadge');
    if (badge) {
      if (pct !== null) {
        const up = pct >= 0;
        badge.textContent = (up?'▲ ':'▼ ') + Math.abs(pct) + '% ' + (up?'증가':'감소');
        badge.style.background = up?'#e8faf3':'#fff5f5';
        badge.style.color = up?'#00a87a':'#e74c3c';
      } else { badge.textContent='지난 주 데이터 없음'; badge.style.background='#f0f2f7'; badge.style.color='#aaa'; }
    }

    const statsEl = document.getElementById('weeklyStats');
    if (statsEl) statsEl.innerHTML = `
      <div style="margin-bottom:20px;">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">이번 주 (최근 7일)</div>
        <div style="font-size:1.45rem;font-weight:800;color:#1a202c;letter-spacing:-0.02em;">${formatKrw(thisW)}</div>
      </div>
      <div style="padding-top:16px;border-top:1px solid #f0f2f7;">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">지난 주 (7일 전)</div>
        <div style="font-size:1rem;font-weight:600;color:#aaa;">${formatKrw(lastW)}</div>
      </div>`;

    requestAnimationFrame(() => drawBarChart({
      canvasId: 'weeklyChart',
      H: 160,
      days,
      colorFn: (d) => d.isToday ? '#2563eb' : '#c7d2fe',
      valFmt: v => v>=10000 ? (v/10000).toFixed(1).replace(/\.0$/,'')+'만' : v.toLocaleString(),
    }));
  }

  function renderHistory() {
    const el = document.getElementById('recentHistoryBody');
    if (!el) return;
    el.innerHTML = HISTORY.slice(0,10).map(h => `
      <tr>
        <td>${h.stationName}</td>
        <td style="font-family:monospace;font-size:0.8rem;">${h.chargerId}</td>
        <td>${h.vehicle}</td>
        <td>${formatDate(h.startTime)}</td>
        <td>${h.kwh} kWh</td>
        <td><strong>${formatKrw(h.amount)}</strong></td>
        <td>${h.memberType}</td>
      </tr>`).join('');
  }

  function renderStationRank() {
    const el = document.getElementById('stationRankContent');
    if (!el) return;
    const rev = {};
    HISTORY.forEach(h => { rev[h.stationName] = (rev[h.stationName]||0) + h.amount; });
    const ranked = Object.entries(rev).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const max = ranked[0]?.[1] || 1;
    const medals = ['🥇','🥈','🥉','4','5'];
    const colors = ['#fbbf24','#94a3b8','#cd7c3e','#c7d2fe','#dbeafe'];
    el.innerHTML = ranked.map(([name, amt], i) => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i<ranked.length-1?'border-bottom:1px solid #f0f2f7;':''}">
        <span style="font-size:${i<3?'1.2rem':'0.85rem'};width:28px;text-align:center;flex-shrink:0;color:#888;">${medals[i]}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.85rem;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</div>
          <div style="height:6px;background:#f0f2f7;border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${Math.round(amt/max*100)}%;background:${colors[i]};border-radius:3px;"></div>
          </div>
        </div>
        <div style="font-size:0.85rem;font-weight:700;color:#1a202c;flex-shrink:0;min-width:56px;text-align:right;">${(amt/10000).toFixed(0)}만원</div>
      </div>`).join('');
  }

  async function renderVisitors() {
    const DOW = ['일','월','화','수','목','금','토'];
    const today = new Date(); today.setHours(0,0,0,0);
    const dayMap = await getPageViews({ days: 7 });
    const isReal = dayMap !== null;

    const days = Array.from({length:7}, (_,i) => {
      const d = new Date(today); d.setDate(today.getDate()-(6-i));
      const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const val = isReal ? (dayMap[k]||0) : getMockDays(7,80,230)[i].value;
      return { label:`${d.getMonth()+1}/${d.getDate()}`, dow:DOW[d.getDay()], value:val, isToday:i===6 };
    });

    // 배지 업데이트
    const badge = document.querySelector('#wc-visitors .demo-badge');
    if (badge) {
      if (isReal) { badge.textContent='실시간'; badge.style.cssText='font-size:0.72rem;color:#00a87a;padding:3px 8px;background:#e8faf3;border:1px solid #6ee7b7;border-radius:6px;'; }
    }
    const notice = document.querySelector('#wc-visitors .sql-notice');
    if (notice) notice.style.display = isReal ? 'none' : '';

    const todayVal = days[days.length-1].value;
    const total = days.reduce((s,d)=>s+d.value,0);
    const statsEl = document.getElementById('visitorStats');
    if (statsEl) statsEl.innerHTML = `
      <div style="margin-bottom:20px;">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">오늘 방문자</div>
        <div style="font-size:1.4rem;font-weight:800;color:#1a202c;">${todayVal.toLocaleString()}<span style="font-size:0.85rem;color:#aaa;font-weight:400;">명</span></div>
      </div>
      <div style="padding-top:16px;border-top:1px solid #f0f2f7;">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">7일 합계</div>
        <div style="font-size:1rem;font-weight:600;color:#aaa;">${total.toLocaleString()}명</div>
      </div>`;
    requestAnimationFrame(() => drawBarChart({ canvasId:'visitorChart', H:140, days, colorFn:(d)=>d.isToday?'#2563eb':'#c7d2fe' }));
  }

  async function renderMembers() {
    const DOW = ['일','월','화','수','목','금','토'];
    const today = new Date(); today.setHours(0,0,0,0);
    const dayMap = await getMembers({ days: 7 });
    const isReal = dayMap !== null;

    const days = Array.from({length:7}, (_,i) => {
      const d = new Date(today); d.setDate(today.getDate()-(6-i));
      const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const val = isReal ? (dayMap[k]||0) : getMockDays(7,2,20)[i].value;
      return { label:`${d.getMonth()+1}/${d.getDate()}`, dow:DOW[d.getDay()], value:val, isToday:i===6 };
    });

    const badge = document.querySelector('#wc-members .demo-badge');
    if (badge) {
      if (isReal) { badge.textContent='실시간'; badge.style.cssText='font-size:0.72rem;color:#00a87a;padding:3px 8px;background:#e8faf3;border:1px solid #6ee7b7;border-radius:6px;'; }
    }
    const notice = document.querySelector('#wc-members .sql-notice');
    if (notice) notice.style.display = isReal ? 'none' : '';

    const todayVal = days[days.length-1].value;
    const total = days.reduce((s,d)=>s+d.value,0);
    const statsEl = document.getElementById('memberStats');
    if (statsEl) statsEl.innerHTML = `
      <div style="margin-bottom:20px;">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">오늘 신규 회원</div>
        <div style="font-size:1.4rem;font-weight:800;color:#1a202c;">${todayVal}<span style="font-size:0.85rem;color:#aaa;font-weight:400;">명</span></div>
      </div>
      <div style="padding-top:16px;border-top:1px solid #f0f2f7;">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">7일 합계</div>
        <div style="font-size:1rem;font-weight:600;color:#aaa;">${total}명</div>
      </div>`;
    requestAnimationFrame(() => drawBarChart({ canvasId:'memberChart', H:140, days, colorFn:(d)=>d.isToday?'#00c896':'#a7f3d0' }));
  }

  function renderWidget(id) {
    switch(id) {
      case 'stat':        renderStat();        break;
      case 'charger':     renderCharger();     break;
      case 'faults':      renderFaults();      break;
      case 'weekly':      renderWeekly();      break;
      case 'history':     renderHistory();     break;
      case 'stationRank': renderStationRank(); break;
      case 'visitors':    renderVisitors();    break;
      case 'members':     renderMembers();     break;
    }
  }

  // ── 위젯 추가 / 제거 ────────────────────────────────
  function addWidget(id) {
    if (document.querySelector(`.dash-section[data-id="${id}"]`)) return;
    const def = WIDGET_DEFS.find(w => w.id === id);
    if (!def) return;
    const sec = buildSection(def);
    document.getElementById('dashboardContent').appendChild(sec);
    document.getElementById(`wc-${id}`).innerHTML = getWidgetHTML(id);
    if (editActive) { sec.classList.add('edit-mode'); sec.setAttribute('draggable','true'); }
    requestAnimationFrame(() => renderWidget(id));
    updateCatalog(); saveOrder();
  }

  function removeWidget(id) {
    const sec = document.querySelector(`.dash-section[data-id="${id}"]`);
    if (sec) sec.remove();
    updateCatalog(); saveOrder();
  }

  // ── 편집 모드 ────────────────────────────────────────
  function updateCatalog() {
    const grid = document.getElementById('widgetCatalogGrid');
    const visible = new Set([...document.querySelectorAll('#dashboardContent > .dash-section')].map(s=>s.dataset.id));
    const hidden = WIDGET_DEFS.filter(w => !visible.has(w.id));
    if (!hidden.length) { grid.innerHTML = '<span class="wcat-empty">모든 위젯이 표시 중입니다.</span>'; return; }
    grid.innerHTML = hidden.map(w => `
      <div class="wcat-card" onclick="addWidget('${w.id}')">
        <div class="wcat-icon">${w.icon}</div>
        <div class="wcat-label">${w.label}</div>
        <div class="wcat-desc">${w.desc}</div>
        ${w.needsSQL ? `<div class="wcat-sql">⚠ SQL 필요: ${w.needsSQL}</div>` : ''}
      </div>`).join('');
  }

  function toggleEdit() {
    editActive = !editActive;
    const btn = document.getElementById('editDashBtn');
    const catalog = document.getElementById('widgetCatalog');
    document.querySelectorAll('#dashboardContent > .dash-section').forEach(s => {
      s.classList.toggle('edit-mode', editActive);
      if (editActive) s.setAttribute('draggable','true');
      else s.removeAttribute('draggable');
    });
    btn.textContent = editActive ? '✓ 완료' : '✏ 편집';
    btn.classList.toggle('active', editActive);
    catalog.classList.toggle('show', editActive);
    if (editActive) updateCatalog();
    else { if (dropPh&&dropPh.parentNode) dropPh.remove(); saveOrder(); }
  }

  // ── 드래그&드롭 ──────────────────────────────────────
  function initDnD() {
    const container = document.getElementById('dashboardContent');
    container.addEventListener('dragstart', e => {
      const sec = e.target.closest('.dash-section');
      if (!sec || !editActive) { e.preventDefault(); return; }
      dragSrc = sec;
      dropPh = document.createElement('div');
      dropPh.className = 'drop-ph';
      dropPh.style.height = sec.getBoundingClientRect().height + 'px';
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => sec.classList.add('is-dragging'), 0);
    });
    container.addEventListener('dragend', () => {
      if (dragSrc) dragSrc.classList.remove('is-dragging');
      if (dropPh && dropPh.parentNode) dropPh.remove();
      dragSrc = null; dropPh = null;
    });
    container.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragSrc || !dropPh) return;
      const sec = e.target.closest('#dashboardContent > .dash-section');
      if (!sec || sec === dragSrc) return;
      if (dropPh.parentNode) dropPh.remove();
      const mid = sec.getBoundingClientRect().top + sec.offsetHeight / 2;
      if (e.clientY < mid) sec.before(dropPh); else sec.after(dropPh);
    });
    container.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc) return;
      if (dropPh && dropPh.parentNode) dropPh.replaceWith(dragSrc);
    });
  }

  // ── 초기화 ───────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    await initData();
    const container = document.getElementById('dashboardContent');
    getOrder().forEach(id => {
      const def = WIDGET_DEFS.find(w => w.id === id);
      if (!def) return;
      const sec = buildSection(def);
      container.appendChild(sec);
      document.getElementById(`wc-${id}`).innerHTML = getWidgetHTML(id);
    });
    getOrder().forEach(id => renderWidget(id));
    initDnD();
  });
  </script>
</body>
