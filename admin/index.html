<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KDN Charge 운영시스템 — 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body data-page="dashboard">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">대시보드</span>
      <div class="topbar-right">
        <span class="topbar-date" id="topbarDate"></span>
        <div class="topbar-user">
          <div class="user-avatar">관</div>
          <span>관리자</span>
        </div>
      </div>
    </div>

    <div class="page-content">

      <!-- 통계 카드 -->
      <div class="stat-grid" id="statGrid"></div>

      <!-- 2열 레이아웃 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">

        <!-- 충전기 상태 요약 -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">충전기 상태 요약</span>
            <a href="realtime.html" class="btn btn-sm btn-secondary">전체보기</a>
          </div>
          <div class="card-body" style="display:flex;gap:24px;align-items:center;">
            <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;">
              <canvas id="statusDonut" width="150" height="150"></canvas>
            </div>
            <div id="statusSummary" style="flex:1;"></div>
          </div>
        </div>

        <!-- 최근 고장 접수 -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">최근 고장 접수</span>
            <a href="fault.html" class="btn btn-sm btn-secondary">전체보기</a>
          </div>
          <div class="card-body" id="recentFaults" style="padding:0;"></div>
        </div>

      </div>

      <!-- 주간 매출 현황 -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <span class="card-title">주간 매출 현황</span>
          <span id="weeklyChangeBadge" style="font-size:0.82rem;font-weight:700;padding:4px 14px;border-radius:100px;"></span>
          <a href="history.html" class="btn btn-sm btn-secondary" style="margin-left:8px;">전체보기</a>
        </div>
        <div class="card-body" style="display:flex;gap:32px;align-items:flex-start;">
          <div id="weeklyStats" style="flex-shrink:0;min-width:155px;"></div>
          <div style="flex:1;min-width:0;position:relative;">
            <canvas id="weeklyChart" height="160" style="display:block;width:100%;"></canvas>
          </div>
        </div>
      </div>

      <!-- 오늘 충전 내역 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">최근 충전 내역 (최신 10건)</span>
          <a href="history.html" class="btn btn-sm btn-secondary">전체보기</a>
        </div>
        <div class="table-wrap">
          <table id="recentHistoryTable">
            <thead>
              <tr>
                <th>충전소</th>
                <th>충전기 ID</th>
                <th>차량번호</th>
                <th>시작 시각</th>
                <th>충전량(kWh)</th>
                <th>결제 금액</th>
                <th>회원유형</th>
              </tr>
            </thead>
            <tbody id="recentHistoryBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="env.js"></script>
  <script src="supabase-client.js"></script>
  <script src="admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initData();
      // 통계 카드
      const totalChargers = CHARGERS.length;
      const availableCount = CHARGERS.filter(c => c.status === 'available').length;
      const chargingCount = CHARGERS.filter(c => c.status === 'charging').length;
      const faultCount = CHARGERS.filter(c => c.status === 'fault').length;

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-icon green">📍</div>
          <div class="stat-card-info">
            <div class="stat-card-num">${STATIONS.length}</div>
            <div class="stat-card-label">전체 충전소</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon blue">⚡</div>
          <div class="stat-card-info">
            <div class="stat-card-num">${totalChargers}</div>
            <div class="stat-card-label">전체 충전기</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon orange">🔌</div>
          <div class="stat-card-info">
            <div class="stat-card-num">${chargingCount}</div>
            <div class="stat-card-label">현재 충전 중</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon red">🚨</div>
          <div class="stat-card-info">
            <div class="stat-card-num">${faultCount}</div>
            <div class="stat-card-label">고장 충전기</div>
          </div>
        </div>
      `;

      // 상태 요약 도넛
      const statusData = [
        { label: '충전 가능', count: availableCount, cls: 'badge-available', color: '#00c896' },
        { label: '충전 중', count: chargingCount, cls: 'badge-charging', color: '#2563eb' },
        { label: '고장', count: faultCount, cls: 'badge-fault', color: '#e74c3c' },
        { label: '오프라인', count: CHARGERS.filter(c=>c.status==='offline').length, cls: 'badge-offline', color: '#999' },
        { label: '점검 중', count: CHARGERS.filter(c=>c.status==='maintenance').length, cls: 'badge-maintenance', color: '#d97706' },
      ];
      // 도넛 차트 — 인터랙티브 애니메이션
      const canvas = document.getElementById('statusDonut');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const SIZE = 160;
      canvas.width = SIZE * dpr; canvas.height = SIZE * dpr;
      canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';
      ctx.scale(dpr, dpr);
      const cx = SIZE / 2, cy = SIZE / 2, outerR = 66, innerR = 40;

      // 세그먼트 사전 계산 (0→2π, 상단 기준)
      const segments = [];
      let cumAngle = 0;
      statusData.forEach(s => {
        if (s.count === 0) return;
        const slice = (s.count / totalChargers) * 2 * Math.PI;
        segments.push({ ...s, start: cumAngle, end: cumAngle + slice });
        cumAngle += slice;
      });

      let hoveredSeg = null;
      const expand = new Array(segments.length).fill(0);
      let rafId = null;

      function drawDonut() {
        ctx.clearRect(0, 0, SIZE, SIZE);

        // 세그먼트
        segments.forEach((s, i) => {
          const r = outerR + expand[i];
          const gap = 0.018;
          const rs = s.start - Math.PI / 2 + gap;
          const re = s.end   - Math.PI / 2 - gap;
          if (re <= rs) return;

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, rs, re);
          ctx.closePath();

          // 호버 시 밝은 glow
          if (i === hoveredSeg) {
            ctx.shadowColor = s.color;
            ctx.shadowBlur = 10;
          }
          ctx.fillStyle = s.color;
          ctx.fill();
          ctx.shadowBlur = 0;
        });

        // 도넛 구멍
        ctx.beginPath();
        ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffffff';
        ctx.fill();

        // 중앙 텍스트
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (hoveredSeg !== null && segments[hoveredSeg]) {
          const s = segments[hoveredSeg];
          ctx.fillStyle = s.color;
          ctx.font = `bold 20px 'Noto Sans KR', sans-serif`;
          ctx.fillText(s.count + '대', cx, cy - 11);
          ctx.font = `11px 'Noto Sans KR', sans-serif`;
          ctx.fillStyle = '#555';
          ctx.fillText(s.label, cx, cy + 11);
        } else {
          ctx.fillStyle = '#1a202c';
          ctx.font = `bold 22px 'Noto Sans KR', sans-serif`;
          ctx.fillText(totalChargers, cx, cy - 10);
          ctx.font = `12px 'Noto Sans KR', sans-serif`;
          ctx.fillStyle = '#aaa';
          ctx.fillText('전체 충전기', cx, cy + 12);
        }
      }

      function animLoop() {
        let dirty = false;
        segments.forEach((_, i) => {
          const target = i === hoveredSeg ? 9 : 0;
          const diff = target - expand[i];
          if (Math.abs(diff) > 0.15) { expand[i] += diff * 0.2; dirty = true; }
          else expand[i] = target;
        });
        drawDonut();
        if (dirty) rafId = requestAnimationFrame(animLoop);
        else rafId = null;
      }

      function triggerAnim() {
        if (!rafId) rafId = requestAnimationFrame(animLoop);
      }

      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left - cx;
        const my = e.clientY - rect.top - cy;
        const dist = Math.sqrt(mx * mx + my * my);

        if (dist < innerR || dist > outerR + 14) {
          if (hoveredSeg !== null) { hoveredSeg = null; triggerAnim(); }
          canvas.style.cursor = 'default';
          return;
        }

        let a = Math.atan2(my, mx) + Math.PI / 2;
        if (a < 0) a += 2 * Math.PI;
        const idx = segments.findIndex(s => a >= s.start && a < s.end);
        const next = idx >= 0 ? idx : null;
        if (next !== hoveredSeg) { hoveredSeg = next; triggerAnim(); }
        canvas.style.cursor = next !== null ? 'pointer' : 'default';
      });

      canvas.addEventListener('mouseleave', () => {
        hoveredSeg = null;
        triggerAnim();
      });

      drawDonut();

      // 상태 바 목록
      document.getElementById('statusSummary').innerHTML = statusData.map(s => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;">
          <div style="display:flex;align-items:center;gap:7px;min-width:72px;">
            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0;"></span>
            <span style="font-size:0.82rem;color:#555;">${s.label}</span>
          </div>
          <div style="flex:1;margin:0 10px;height:7px;background:#f0f2f7;border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${totalChargers ? Math.round(s.count/totalChargers*100) : 0}%;background:${s.color};border-radius:4px;transition:width 0.4s;"></div>
          </div>
          <strong style="min-width:36px;text-align:right;font-size:0.88rem;color:#333;">${s.count}<span style="font-weight:400;color:#aaa;font-size:0.78rem;">대</span></strong>
        </div>
      `).join('');

      // 최근 고장
      document.getElementById('recentFaults').innerHTML = FAULTS.slice(0,3).map(f => `
        <div style="padding:14px 20px;border-bottom:1px solid #f0f2f7;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <span class="badge ${f.severity==='high'?'badge-fault':f.severity==='medium'?'badge-maintenance':'badge-offline'}">${f.severity==='high'?'긴급':f.severity==='medium'?'보통':'경미'}</span>
            <strong style="font-size:0.88rem;">${f.stationName}</strong>
          </div>
          <div style="font-size:0.82rem;color:#555;">${f.chargerId} · ${f.type}</div>
          <div style="font-size:0.78rem;color:#bbb;margin-top:2px;">${f.reportedAt}</div>
        </div>
      `).join('') + `<div style="text-align:center;padding:12px;"><a href="fault.html" style="font-size:0.82rem;color:#00a87a;">전체 고장 내역 보기 →</a></div>`;

      // ── 주간 매출 계산 ──────────────────────────────
      const todayMidnight = new Date();
      todayMidnight.setHours(0, 0, 0, 0);

      // 이번 주: 오늘 포함 최근 7일 / 지난 주: 그 전 7일
      const thisWeekStart = new Date(todayMidnight);
      thisWeekStart.setDate(todayMidnight.getDate() - 6);
      const lastWeekStart = new Date(thisWeekStart);
      lastWeekStart.setDate(thisWeekStart.getDate() - 7);

      let thisWeekTotal = 0, lastWeekTotal = 0;
      const dailyRevMap = {};

      HISTORY.forEach(h => {
        const t = new Date(h.startTime);
        const dayKey = `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
        if (t >= thisWeekStart) {
          thisWeekTotal += h.amount;
          dailyRevMap[dayKey] = (dailyRevMap[dayKey] || 0) + h.amount;
        } else if (t >= lastWeekStart) {
          lastWeekTotal += h.amount;
        }
      });

      // 7일치 배열
      const weekDays = [];
      const DOW = ['일','월','화','수','목','금','토'];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(todayMidnight);
        d.setDate(todayMidnight.getDate() - i);
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        weekDays.push({
          date: `${d.getMonth()+1}/${d.getDate()}`,
          dow: DOW[d.getDay()],
          value: dailyRevMap[key] || 0,
          isToday: i === 0,
        });
      }

      const pctChange = lastWeekTotal > 0
        ? Math.round((thisWeekTotal - lastWeekTotal) / lastWeekTotal * 100)
        : null;

      // 배지
      const wcBadge = document.getElementById('weeklyChangeBadge');
      if (pctChange !== null) {
        const up = pctChange >= 0;
        wcBadge.textContent = (up ? '▲ ' : '▼ ') + Math.abs(pctChange) + '% ' + (up ? '증가' : '감소');
        wcBadge.style.background = up ? '#e8faf3' : '#fff5f5';
        wcBadge.style.color = up ? '#00a87a' : '#e74c3c';
      } else {
        wcBadge.textContent = '지난 주 데이터 없음';
        wcBadge.style.background = '#f0f2f7';
        wcBadge.style.color = '#aaa';
      }

      // 요약 수치
      document.getElementById('weeklyStats').innerHTML = `
        <div style="margin-bottom:20px;">
          <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;letter-spacing:0.02em;">이번 주 (최근 7일)</div>
          <div style="font-size:1.45rem;font-weight:800;color:#1a202c;letter-spacing:-0.02em;">${formatKrw(thisWeekTotal)}</div>
        </div>
        <div style="padding-top:16px;border-top:1px solid #f0f2f7;">
          <div style="font-size:0.75rem;color:#aaa;margin-bottom:5px;">지난 주 (7일 전)</div>
          <div style="font-size:1rem;font-weight:600;color:#aaa;">${formatKrw(lastWeekTotal)}</div>
        </div>
      `;

      // ── 바 차트 ─────────────────────────────────────
      const wc = document.getElementById('weeklyChart');
      const wcCtx = wc.getContext('2d');
      const wcDpr = window.devicePixelRatio || 1;
      const W = wc.parentElement.offsetWidth || 480;
      const H = 160;
      wc.width = W * wcDpr; wc.height = H * wcDpr;
      wc.style.width = W + 'px'; wc.style.height = H + 'px';
      wcCtx.scale(wcDpr, wcDpr);

      const maxRev = Math.max(...weekDays.map(d => d.value), 1);
      const chartB = H - 40, chartT = 24;
      const slotW = W / weekDays.length;
      const barW = Math.min(slotW * 0.5, 48);

      // 가이드라인 3줄
      wcCtx.strokeStyle = '#f0f2f7';
      wcCtx.lineWidth = 1;
      [0.33, 0.66, 1].forEach(r => {
        const gy = chartB - r * (chartB - chartT);
        wcCtx.beginPath(); wcCtx.moveTo(0, gy); wcCtx.lineTo(W, gy); wcCtx.stroke();
        const label = Math.round(maxRev * r / 10000) + '만';
        wcCtx.fillStyle = '#ccc';
        wcCtx.font = `9px 'Noto Sans KR',sans-serif`;
        wcCtx.textAlign = 'right';
        wcCtx.fillText(label, W - 2, gy - 3);
      });

      weekDays.forEach((d, i) => {
        const cx2 = slotW * i + slotW / 2;
        const bx = cx2 - barW / 2;
        const barH = d.value > 0 ? Math.max(4, (d.value / maxRev) * (chartB - chartT)) : 0;
        const by = chartB - barH;

        // 바 그라디언트
        const grad = wcCtx.createLinearGradient(bx, by, bx, chartB);
        if (d.isToday) {
          grad.addColorStop(0, '#2563eb');
          grad.addColorStop(1, '#93c5fd');
        } else {
          grad.addColorStop(0, '#c7d2fe');
          grad.addColorStop(1, '#e0e7ff');
        }
        wcCtx.fillStyle = grad;
        wcCtx.beginPath();
        wcCtx.moveTo(bx + 3, by);
        wcCtx.arcTo(bx + barW, by, bx + barW, chartB, 3);
        wcCtx.lineTo(bx + barW, chartB);
        wcCtx.lineTo(bx, chartB);
        wcCtx.lineTo(bx, by + 3);
        wcCtx.arcTo(bx, by, bx + barW, by, 3);
        wcCtx.fill();

        // 금액 레이블
        if (d.value > 0) {
          wcCtx.fillStyle = d.isToday ? '#2563eb' : '#94a3b8';
          wcCtx.font = `${d.isToday ? 'bold ' : ''}10px 'Noto Sans KR',sans-serif`;
          wcCtx.textAlign = 'center';
          wcCtx.textBaseline = 'bottom';
          const vLabel = d.value >= 10000 ? (d.value/10000).toFixed(1).replace(/\.0$/,'') + '만' : d.value.toLocaleString();
          wcCtx.fillText(vLabel, cx2, by - 3);
        }

        // 날짜/요일 레이블
        wcCtx.textBaseline = 'top';
        wcCtx.textAlign = 'center';
        wcCtx.fillStyle = d.isToday ? '#2563eb' : '#94a3b8';
        wcCtx.font = `${d.isToday ? 'bold ' : ''}10px 'Noto Sans KR',sans-serif`;
        wcCtx.fillText(d.date, cx2, chartB + 6);
        wcCtx.fillStyle = d.isToday ? '#2563eb' : '#cbd5e1';
        wcCtx.font = `9px 'Noto Sans KR',sans-serif`;
        wcCtx.fillText(d.dow, cx2, chartB + 20);
      });

      // 베이스라인
      wcCtx.strokeStyle = '#e2e8f0';
      wcCtx.lineWidth = 1.5;
      wcCtx.beginPath(); wcCtx.moveTo(0, chartB); wcCtx.lineTo(W, chartB); wcCtx.stroke();

      // 최근 충전 내역
      const tbody = document.getElementById('recentHistoryBody');
      tbody.innerHTML = HISTORY.slice(0, 10).map(h => `
        <tr>
          <td>${h.stationName}</td>
          <td style="font-family:monospace;font-size:0.8rem;">${h.chargerId}</td>
          <td>${h.vehicle}</td>
          <td>${formatDate(h.startTime)}</td>
          <td>${h.kwh} kWh</td>
          <td><strong>${formatKrw(h.amount)}</strong></td>
          <td>${h.memberType}</td>
        </tr>
      `).join('');
    });
  </script>
</body>
</html>
